<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOM | Structured Transformation Output Model</title>
    <!-- Keep PapaParse for CSV and add SheetJS for Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #22d3ee;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0f172a 100%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: -0.05em;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 32px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .upload-area {
            position: relative;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 60px 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.02);
            display: block;
        }

        .upload-area:hover {
            border-color: var(--accent);
            background: rgba(34, 211, 238, 0.05);
            transform: translateY(-2px);
        }

        #fileInput { display: none; }

        .icon-box {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        #status {
            margin-top: 24px;
            font-size: 0.85rem;
            min-height: 20px;
        }

        .success { color: var(--accent); font-weight: bold; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.1); }
            70% { box-shadow: 0 0 0 20px rgba(34, 211, 238, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); }
        }
        .processing { animation: pulse 1.5s infinite; }
    </style>
</head>
<body>

<div class="container">
    <h1>STOM</h1>
    <div class="subtitle">Structured Transformation Output Model</div>
    
    <label for="fileInput" class="upload-area" id="dropZone">
        <span class="icon-box">📂</span>
        <div id="fileName" style="font-weight: 600;">Drop CSV or Excel (.xlsx, .xlsm)</div>
        <div style="font-size: 0.8rem; color: var(--text-dim); margin-top: 8px;">Automated ESG Data Mapping Engine</div>
        <input type="file" id="fileInput" accept=".csv, .xlsx, .xlsm">
    </label>

    <div id="status">Ready for ingestion...</div>
</div>

<script>
    const targetColumns = [
        "CompanyName", "EndOfFiscalYearPA", "FinancialAndEnergy__TypeOfQuantification",
        "FinancialAndEnergy__CurrencyIso", "FinancialAndEnergy__ReportedAmount",
        "FinancialAndEnergy__Reportedunit", "FinancialAndEnergy__Amount",
        "FinancialAndEnergy__Unit", "FinancialAndEnergy__Source",
        "FinancialAndEnergy__SourceSubTypeName", "FinancialAndEnergy__URL",
        "FinancialAndEnergy__PageNo", "FinancialAndEnergy__Observations",
        "FinancialAndEnergy__TotalElectricity (TWH)", "FinancialAndEnergy__OilProduction",
        "FinancialAndEnergy__GasProduction", "FinancialAndEnergy__CoalProduction",
        "SegmentName", "SegmentValue", "SegmentUnit", "Segment_Source",
        "Segment_SubSource", "Segment_URL", "SegmentPage", "SegmentationExplanation_New",
        "SegmentPrimaryInformation", "IncludeAsActivtySum",
        "Segmentation__Segments__Activity__Name", "PercentOfSegment",
        "ActivityExplanation", "ESGDS Comment or Justification"
    ];

    const mapping = {
        'entity_name': 'CompanyName',
        'consolidated_end_of_fiscal_year': 'EndOfFiscalYearPA',
        'consolidated_type_of_reporting': 'FinancialAndEnergy__TypeOfQuantification',
        'consolidated_revenue_currency': 'FinancialAndEnergy__CurrencyIso',
        'consolidated_revenue_amount': 'FinancialAndEnergy__ReportedAmount',
        'consolidated_revenue_unit': 'FinancialAndEnergy__Reportedunit',
        'consolidated_narrative_or_observations': 'FinancialAndEnergy__Observations',
        'consolidated_source_filename': 'FinancialAndEnergy__Source',
        'consolidated_page_number': 'FinancialAndEnergy__PageNo',
        'segment_name': 'SegmentName',
        'segment_revenue': 'SegmentValue',
        'unit': 'SegmentUnit',
        'segment_explanation': 'SegmentationExplanation_New',
        'segment_primary_information': 'SegmentPrimaryInformation',
        'source_page_number': 'SegmentPage',
        'ibac_activity_name': 'Segmentation__Segments__Activity__Name',
        'percent_of_segment': 'PercentOfSegment',
        'activities_allocated_to_segment': 'ActivityExplanation',
        'justification': 'ESGDS Comment or Justification',
        'source_filename': 'FinancialAndEnergy__Source'
    };

    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const dropZone = document.getElementById('dropZone');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        handleProcess(file);
    });

    function handleProcess(file) {
        const fileName = file.name;
        const extension = fileName.split('.').pop().toLowerCase();
        
        document.getElementById('fileName').textContent = fileName;
        status.innerHTML = '<span style="color: var(--accent)">MODEL RUNNING...</span>';
        dropZone.classList.add('processing');

        if (extension === 'csv') {
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    executeTransformation(results.data, fileName);
                }
            });
        } else if (extension === 'xlsx' || extension === 'xlsm') {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                // Target the first sheet
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                // Convert to JSON
                const jsonData = XLSX.utils.sheet_to_json(worksheet);
                executeTransformation(jsonData, fileName);
            };
            reader.readAsArrayBuffer(file);
        } else {
            status.innerHTML = '<span style="color: #ef4444">Unsupported file format</span>';
            dropZone.classList.remove('processing');
        }
    }

    function executeTransformation(data, fileName) {
        setTimeout(() => {
            transformData(data, fileName);
            dropZone.classList.remove('processing');
        }, 800);
    }

    function transformData(data, originalName) {
        const transformed = data.map(row => {
            let newRow = {};
            targetColumns.forEach(col => newRow[col] = "");
            Object.keys(mapping).forEach(srcKey => {
                if (row[srcKey] !== undefined) {
                    newRow[mapping[srcKey]] = row[srcKey];
                }
            });
            return newRow;
        });

        const csv = Papa.unparse({
            fields: targetColumns,
            data: transformed
        });

        downloadCSV(csv, `STOM_Export_${originalName.split('.')[0]}.csv`);
    }

    function downloadCSV(csv, filename) {
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", filename);
        link.click();
        status.innerHTML = '<span class="success">✓ TRANSFORMATION SUCCESSFUL</span>';
    }
</script>

</body>
</html>
